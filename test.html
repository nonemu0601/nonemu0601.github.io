<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FILE://REPOSITORY — nonemu0601</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root {
  --bg:       #030407;
  --bg2:      #07090f;
  --surface:  rgba(10,15,28,0.85);
  --border:   rgba(0,255,210,0.12);
  --border-h: rgba(0,255,210,0.6);
  --cyan:     #00ffd2;
  --pink:     #ff2d78;
  --amber:    #ffbe00;
  --white:    #eef2ff;
  --muted:    #4a5570;
  --grid-col: rgba(0,255,210,0.03);
  --font-display: 'Syne', sans-serif;
  --font-mono:    'Space Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 4px; }

/* ============================================================
   CURSOR
   ============================================================ */
body { cursor: none; }
#cursor {
  position: fixed; top: 0; left: 0; z-index: 9999;
  pointer-events: none; mix-blend-mode: difference;
}
#cursor-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cyan);
  position: absolute; transform: translate(-50%,-50%);
  transition: width 0.2s, height 0.2s;
}
#cursor-ring {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--cyan);
  position: absolute; transform: translate(-50%,-50%);
  transition: all 0.12s ease;
  opacity: 0.6;
}
body.cursor-hover #cursor-dot  { width: 12px; height: 12px; }
body.cursor-hover #cursor-ring { width: 54px; height: 54px; opacity: 1; }

/* ============================================================
   BASE LAYOUT
   ============================================================ */
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-display);
  overflow-x: hidden;
}

/* ============================================================
   BACKGROUND LAYERS
   ============================================================ */
#bg-layers {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  pointer-events: none;
}

/* Grid */
#bg-layers::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--grid-col) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, #000 60%, transparent 100%);
}

/* Noise */
#bg-layers::after {
  content: '';
  position: absolute; inset: -200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
  animation: noise 0.2s steps(2) infinite;
}
@keyframes noise {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(-2%,-2%); }
  50%  { transform: translate(2%,0); }
  75%  { transform: translate(-1%,2%); }
  100% { transform: translate(1%,-1%); }
}

/* Scanlines */
#scanlines {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px,
    transparent 1px, transparent 4px
  );
}

/* Ambient glows */
#glow-a {
  position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,210,0.07) 0%, transparent 70%);
  top: -200px; left: -150px;
  animation: floatA 12s ease-in-out infinite;
}
#glow-b {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,45,120,0.06) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: floatB 15s ease-in-out infinite;
}
#glow-c {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,190,0,0.05) 0%, transparent 70%);
  top: 40%; left: 55%;
  animation: floatC 18s ease-in-out infinite;
}
@keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
@keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
@keyframes floatC { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(calc(-50% + 30px),calc(-50% + 40px))} }

/* Canvas particles */
#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ============================================================
   MAIN WRAPPER
   ============================================================ */
#app {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 24px 120px;
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  width: 100%; max-width: 1100px;
  padding: 80px 0 48px;
  display: flex; flex-direction: column; align-items: flex-start;
  position: relative;
}

.header-tag {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.25em;
  color: var(--cyan);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.header-tag::before {
  content: ''; display: block;
  width: 24px; height: 1px; background: var(--cyan);
}

h1 {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 96px);
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: -0.03em;
  position: relative;
  display: inline-block;
}
h1 .word-file {
  display: block;
  background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.5) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
h1 .word-repo {
  display: block;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
}

/* Glitch effect */
h1 .word-repo::before,
h1 .word-repo::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0;
}
h1 .word-repo::before {
  animation: glitch-a 5s infinite;
  clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  transform: translateX(-3px);
}
h1 .word-repo::after {
  animation: glitch-b 5s infinite;
  clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  transform: translateX(3px);
}
@keyframes glitch-a {
  0%,89%,91%,100% { opacity: 0 }
  90% { opacity: 0.8; transform: translateX(-3px) skewX(-5deg) }
}
@keyframes glitch-b {
  0%,92%,94%,100% { opacity: 0 }
  93% { opacity: 0.8; transform: translateX(3px) skewX(3deg) }
}

.header-sub {
  margin-top: 24px;
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
}
.header-url {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.header-url:hover { color: var(--cyan); }

.stat-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--surface);
  transition: all 0.3s;
}
.stat-pill span { color: var(--cyan); margin-right: 4px; }

/* Horizontal rule */
.h-rule {
  width: 100%; max-width: 1100px;
  height: 1px;
  background: linear-gradient(90deg, var(--cyan), var(--pink), transparent);
  opacity: 0.3;
  margin-bottom: 36px;
}

/* ============================================================
   CONTROLS BAR
   ============================================================ */
#controls {
  width: 100%; max-width: 1100px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

/* Search */
#search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 400px;
}
#search-wrap svg {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted); pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--white);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px 14px 10px 40px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  caret-color: var(--cyan);
}
#search::placeholder { color: var(--muted); }
#search:focus {
  border-color: rgba(0,255,210,0.5);
  box-shadow: 0 0 0 3px rgba(0,255,210,0.06);
}

/* Sort */
.ctrl-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--white);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 14px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
  appearance: none;
}
.ctrl-select:focus, .ctrl-select:hover { border-color: rgba(0,255,210,0.4); }

/* View toggle */
.view-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.view-btn {
  border: none;
  background: none;
  color: var(--muted);
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.view-btn svg { width: 16px; height: 16px; }
.view-btn.active { color: var(--cyan); background: rgba(0,255,210,0.08); }
.view-btn:hover { color: var(--white); }

/* Type filter pills */
#type-filters {
  width: 100%; max-width: 1100px;
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.type-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.type-pill:hover { border-color: rgba(0,255,210,0.3); color: var(--white); }
.type-pill.active { border-color: var(--border-h); color: var(--cyan); background: rgba(0,255,210,0.08); }

/* ============================================================
   FILE GRID / LIST
   ============================================================ */
#file-list {
  width: 100%; max-width: 1100px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  transition: all 0.3s;
}
#file-list.list-view {
  grid-template-columns: 1fr;
  gap: 6px;
}

/* ============================================================
   CARD
   ============================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
  transform-style: preserve-3d;
  will-change: transform;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

/* Holographic shimmer */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.03) 0%,
    rgba(255,255,255,0) 50%,
    rgba(255,255,255,0.01) 100%
  );
  pointer-events: none;
}

/* Glow line top */
.card::after {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,210,0.6), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.card:hover::after { opacity: 1; }

.card:hover {
  border-color: var(--border-h);
  box-shadow:
    0 0 0 1px rgba(0,255,210,0.05),
    0 8px 32px rgba(0,0,0,0.5),
    0 0 60px rgba(0,255,210,0.04);
}

/* Holographic overlay on hover */
.card .holo {
  position: absolute; inset: 0;
  background: linear-gradient(
    105deg,
    transparent 20%,
    rgba(0,255,210,0.03) 30%,
    rgba(255,45,120,0.03) 50%,
    rgba(255,190,0,0.02) 70%,
    transparent 80%
  );
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}
.card:hover .holo { opacity: 1; }

/* List view card */
#file-list.list-view .card {
  padding: 14px 20px;
  border-radius: 8px;
}
#file-list.list-view .icon-box {
  width: 32px; height: 32px;
  border-radius: 7px;
}
#file-list.list-view .file-name { font-size: 13px; }

/* ============================================================
   ICON BOX
   ============================================================ */
.icon-box {
  width: 44px; height: 44px; flex-shrink: 0;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  border: 1px solid;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s;
}
.icon-box::before {
  content: '';
  position: absolute; inset: 0;
  background: currentColor;
  opacity: 0.08;
}
.card:hover .icon-box { transform: scale(1.05); }

/* Type colors */
.t-html  { color: #ff6b2b; border-color: rgba(255,107,43,0.25); }
.t-css   { color: #2b9fff; border-color: rgba(43,159,255,0.25); }
.t-js    { color: #ffd700; border-color: rgba(255,215,0,0.25); }
.t-ts    { color: #4287ff; border-color: rgba(66,135,255,0.25); }
.t-py    { color: #00e676; border-color: rgba(0,230,118,0.25); }
.t-md    { color: #b48eff; border-color: rgba(180,142,255,0.25); }
.t-json  { color: #00bcd4; border-color: rgba(0,188,212,0.25); }
.t-img   { color: #ff4081; border-color: rgba(255,64,129,0.25); }
.t-pdf   { color: #f44336; border-color: rgba(244,67,54,0.25); }
.t-zip   { color: #ffb300; border-color: rgba(255,179,0,0.25); }
.t-sh    { color: #00e676; border-color: rgba(0,230,118,0.25); }
.t-txt   { color: #90a4ae; border-color: rgba(144,164,174,0.25); }
.t-svg   { color: #ff80ab; border-color: rgba(255,128,171,0.25); }
.t-other { color: #78909c; border-color: rgba(120,144,156,0.25); }

/* ============================================================
   FILE INFO
   ============================================================ */
.file-info {
  overflow: hidden; flex: 1; min-width: 0;
}
.file-name {
  display: block;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 400;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
  transition: color 0.2s;
}
.card:hover .file-name { color: var(--cyan); }

.file-meta {
  display: flex; gap: 8px; align-items: center;
}
.file-ext-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid currentColor;
  opacity: 0.7;
}
.file-size {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}

/* Arrow */
.card-arrow {
  color: var(--muted);
  transition: all 0.3s;
  flex-shrink: 0;
  opacity: 0;
}
.card:hover .card-arrow {
  color: var(--cyan);
  opacity: 1;
  transform: translateX(4px);
}

/* Copy button */
.copy-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,255,210,0.08);
  border: 1px solid rgba(0,255,210,0.15);
  border-radius: 6px;
  color: var(--muted);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
  z-index: 10;
  display: flex; align-items: center; gap: 4px;
}
.card:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: rgba(0,255,210,0.15); color: var(--cyan); }
.copy-btn.copied { color: var(--cyan); border-color: var(--cyan); }

/* ============================================================
   SKELETON LOADER
   ============================================================ */
.skeleton {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex; align-items: center; gap: 14px;
  overflow: hidden;
  position: relative;
}
.skeleton::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg,
    transparent 0%, rgba(0,255,210,0.05) 50%, transparent 100%);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.skel-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: rgba(255,255,255,0.04); flex-shrink: 0;
}
.skel-text { flex: 1; }
.skel-line {
  height: 10px; border-radius: 4px;
  background: rgba(255,255,255,0.04);
  margin-bottom: 8px;
}
.skel-line:last-child { width: 40%; margin-bottom: 0; }

/* ============================================================
   EMPTY / ERROR
   ============================================================ */
.msg-box {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  font-family: var(--font-mono);
  color: var(--muted);
  font-size: 13px;
}
.msg-box .msg-icon { font-size: 40px; margin-bottom: 16px; }
.msg-box.error { color: var(--pink); }

/* ============================================================
   TOAST
   ============================================================ */
#toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: rgba(0,15,12,0.9);
  border: 1px solid var(--border-h);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 20px;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,255,210,0.2);
  z-index: 9000;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
  opacity: 0;
  backdrop-filter: blur(12px);
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ============================================================
   FOOTER
   ============================================================ */
footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 12px 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(0deg, rgba(3,4,7,1) 0%, transparent 100%);
  pointer-events: none;
}
.footer-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
}
.footer-status {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

/* ============================================================
   FADE-IN ANIMATION
   ============================================================ */
.card {
  opacity: 0;
  animation: cardIn 0.5s cubic-bezier(0.2,0.8,0.2,1) forwards;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Header entrance */
.hdr-in {
  opacity: 0;
  animation: hdrIn 0.8s cubic-bezier(0.2,0.8,0.2,1) forwards;
}
@keyframes hdrIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  #file-list { grid-template-columns: 1fr; }
  h1 { font-size: 52px; }
  header { padding: 48px 0 32px; }
  footer { padding: 12px 20px; }
}
</style>
</head>
<body>

<!-- Cursor -->
<div id="cursor">
  <div id="cursor-ring"></div>
  <div id="cursor-dot"></div>
</div>

<!-- Background -->
<div id="bg-layers">
  <div id="glow-a"></div>
  <div id="glow-b"></div>
  <div id="glow-c"></div>
</div>
<div id="scanlines"></div>
<canvas id="particles"></canvas>

<div id="app">

  <!-- Header -->
  <header>
    <div class="header-tag hdr-in" style="animation-delay:0.1s">SYSTEM // REPOSITORY</div>
    <h1>
      <span class="word-file hdr-in" style="animation-delay:0.2s">FILE</span>
      <span class="word-repo hdr-in" data-text="ARCHIVE" style="animation-delay:0.3s">ARCHIVE</span>
    </h1>
    <div class="header-sub hdr-in" style="animation-delay:0.5s">
      <a href="https://nonemu0601.github.io" class="header-url">nonemu0601.github.io</a>
      <div class="stat-pill"><span id="file-count">—</span> files</div>
      <div class="stat-pill"><span id="type-count">—</span> types</div>
    </div>
  </header>

  <div class="h-rule hdr-in" style="animation-delay:0.6s"></div>

  <!-- Controls -->
  <div id="controls" class="hdr-in" style="animation-delay:0.7s">
    <div id="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="search files..." autocomplete="off" spellcheck="false">
    </div>
    <select class="ctrl-select" id="sort-select">
      <option value="name-asc">A → Z</option>
      <option value="name-desc">Z → A</option>
      <option value="type-asc">Type</option>
      <option value="size-desc">Largest first</option>
      <option value="size-asc">Smallest first</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" title="Grid view">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" id="btn-list" title="List view">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Type filters -->
  <div id="type-filters" class="hdr-in" style="animation-delay:0.8s">
    <div class="type-pill active" data-type="all">ALL</div>
  </div>

  <!-- File grid -->
  <div id="file-list"></div>

</div>

<!-- Toast -->
<div id="toast">✓ Link copied to clipboard</div>

<!-- Footer -->
<footer>
  <div class="footer-text">FILE://REPOSITORY — nonemu0601.github.io</div>
  <div class="footer-status">
    <div class="status-dot"></div>
    <span>CONNECTED</span>
  </div>
</footer>

<script>
/* ============================================================
   CURSOR
   ============================================================ */
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let cx = -100, cy = -100, rx = -100, ry = -100;

document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  cursorDot.style.left  = cx + 'px';
  cursorDot.style.top   = cy + 'px';
});
(function animRing() {
  rx += (cx - rx) * 0.14;
  ry += (cy - ry) * 0.14;
  cursorRing.style.left = rx + 'px';
  cursorRing.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
})();
document.querySelectorAll('a, button, input, select, .type-pill').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});

/* ============================================================
   PARTICLES
   ============================================================ */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let W, H, pts;

function initCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const N = Math.floor(W * H / 18000);
  pts = Array.from({length: N}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.3,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
    a: Math.random()
  }));
}
function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,210,${p.a * 0.3})`;
    ctx.fill();
  });
  // draw connections
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 100) {
        ctx.beginPath();
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.strokeStyle = `rgba(0,255,210,${(1 - d/100) * 0.06})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
initCanvas();
drawParticles();
window.addEventListener('resize', initCanvas);

/* ============================================================
   FILE TYPE UTILITIES
   ============================================================ */
const EXT_MAP = {
  html: 't-html', htm: 't-html',
  css: 't-css', scss: 't-css', sass: 't-css',
  js: 't-js', mjs: 't-js',
  ts: 't-ts', tsx: 't-ts',
  py: 't-py', ipynb: 't-py',
  md: 't-md', mdx: 't-md',
  json: 't-json', jsonc: 't-json',
  jpg: 't-img', jpeg: 't-img', png: 't-img', gif: 't-img', webp: 't-img', ico: 't-img',
  pdf: 't-pdf',
  zip: 't-zip', tar: 't-zip', gz: 't-zip', rar: 't-zip',
  sh: 't-sh', bash: 't-sh',
  txt: 't-txt', log: 't-txt',
  svg: 't-svg',
};

function getExt(name) {
  const parts = name.split('.');
  return parts.length > 1 ? parts.pop().toLowerCase() : '';
}
function getTypeClass(ext) {
  return EXT_MAP[ext] || 't-other';
}
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

/* ============================================================
   3D TILT
   ============================================================ */
function initTilt(card) {
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    card.style.transform = `perspective(600px) rotateY(${x * 10}deg) rotateX(${-y * 8}deg) translateZ(4px)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = '';
  });
}

/* ============================================================
   TOAST
   ============================================================ */
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ============================================================
   DATA & RENDERING
   ============================================================ */
const owner  = 'nonemu0601';
const repo   = 'nonemu0601.github.io';
const branch = 'main';
const api    = `https://api.github.com/repos/${owner}/${repo}/contents/?ref=${branch}`;

let allFiles = [];
let activeType = 'all';
let currentSort = 'name-asc';
let currentView = 'grid';

const listEl = document.getElementById('file-list');
const searchEl = document.getElementById('search');
const sortEl = document.getElementById('sort-select');
const typeFilters = document.getElementById('type-filters');

// Show skeletons while loading
function showSkeletons(n = 8) {
  listEl.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'skeleton';
    s.innerHTML = `
      <div class="skel-icon"></div>
      <div class="skel-text">
        <div class="skel-line" style="width:${60+Math.random()*30}%"></div>
        <div class="skel-line"></div>
      </div>`;
    listEl.appendChild(s);
  }
}

function renderFiles() {
  const q = searchEl.value.toLowerCase().trim();
  let files = allFiles.filter(f => {
    const matchSearch = !q || f.name.toLowerCase().includes(q);
    const matchType   = activeType === 'all' || getExt(f.name) === activeType;
    return matchSearch && matchType;
  });

  // Sort
  files = files.sort((a, b) => {
    if (currentSort === 'name-asc')  return a.name.localeCompare(b.name);
    if (currentSort === 'name-desc') return b.name.localeCompare(a.name);
    if (currentSort === 'type-asc')  return getExt(a.name).localeCompare(getExt(b.name));
    if (currentSort === 'size-desc') return (b.size||0) - (a.size||0);
    if (currentSort === 'size-asc')  return (a.size||0) - (b.size||0);
    return 0;
  });

  listEl.innerHTML = '';

  if (files.length === 0) {
    const m = document.createElement('div');
    m.className = 'msg-box';
    m.innerHTML = `<div class="msg-icon">◌</div><div>No files found.</div>`;
    listEl.appendChild(m);
    return;
  }

  files.forEach((f, i) => {
    const ext       = getExt(f.name);
    const typeClass = getTypeClass(ext);
    const sizeStr   = formatSize(f.size);
    const label     = ext.toUpperCase() || 'FILE';

    const a = document.createElement('a');
    a.href       = f.html_url ? f.download_url || f.name : f.name;
    a.className  = 'card';
    a.style.animationDelay = `${i * 0.04}s`;
    a.innerHTML = `
      <div class="holo"></div>
      <div class="icon-box ${typeClass}">${label}</div>
      <div class="file-info">
        <span class="file-name" title="${f.name}">${f.name}</span>
        <div class="file-meta">
          <span class="file-ext-badge ${typeClass}">${label}</span>
          ${sizeStr ? `<span class="file-size">${sizeStr}</span>` : ''}
        </div>
      </div>
      <svg class="card-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/>
      </svg>
      <button class="copy-btn" data-url="${location.origin}/${f.name}">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        COPY
      </button>
    `;

    // Copy button
    const copyBtn = a.querySelector('.copy-btn');
    copyBtn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      const url = copyBtn.dataset.url;
      navigator.clipboard.writeText(url).then(() => {
        copyBtn.textContent = '✓ COPIED';
        copyBtn.classList.add('copied');
        showToast('✓ Link copied to clipboard');
        setTimeout(() => {
          copyBtn.innerHTML = `
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            COPY`;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    // Add cursor hover
    a.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    a.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));

    initTilt(a);
    listEl.appendChild(a);
  });
}

function buildTypeFilters(files) {
  const types = new Set(files.map(f => getExt(f.name)).filter(Boolean));
  typeFilters.innerHTML = `<div class="type-pill active" data-type="all">ALL</div>`;
  [...types].sort().forEach(t => {
    const p = document.createElement('div');
    p.className = 'type-pill';
    p.dataset.type = t;
    p.textContent = t.toUpperCase();
    typeFilters.appendChild(p);
  });

  typeFilters.querySelectorAll('.type-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      typeFilters.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeType = pill.dataset.type;
      renderFiles();
    });
  });

  document.getElementById('type-count').textContent = types.size;
}

showSkeletons();

fetch(api)
  .then(r => r.json())
  .then(data => {
    allFiles = data.filter(f => f.type === 'file' && f.name !== 'index.html');
    document.getElementById('file-count').textContent = allFiles.length;
    buildTypeFilters(allFiles);
    renderFiles();
  })
  .catch(err => {
    console.error(err);
    listEl.innerHTML = `<div class="msg-box error"><div class="msg-icon">⚠</div><div>Failed to load files.<br>Check console for details.</div></div>`;
  });

/* ============================================================
   CONTROLS
   ============================================================ */
searchEl.addEventListener('input', renderFiles);

sortEl.addEventListener('change', () => {
  currentSort = sortEl.value;
  renderFiles();
});

document.getElementById('btn-grid').addEventListener('click', () => {
  currentView = 'grid';
  listEl.classList.remove('list-view');
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  renderFiles();
});
document.getElementById('btn-list').addEventListener('click', () => {
  currentView = 'list';
  listEl.classList.add('list-view');
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  renderFiles();
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
  }
  if (e.key === 'Escape') searchEl.blur();
});
</script>
</body>
